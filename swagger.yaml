#   /auth/logout:
#     post:
#       summary: Logout user
#       description: Invalidate the current session/token
#       tags: [Auth]
#       security: [{ bearerAuth: [] }]
#       responses:
#         '200':
#           description: Logout successful
#           content:
#             application/json:
#               schema:
#                 type: object
#                 properties:
#                   success: { type: boolean, example: true }
#                   message: { type: string, example: Logged out successfully }

  /auth/registration/otp/send:
    post:
      summary: Send OTP for registration verification
      description: Send OTP to user's phone/email after registration for verification (requires authentication)
      tags: [Onboarding]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [channel]
              properties:
                channel: 
                  type: string
                  enum: [sms, email]
                  description: Channel to send OTP through
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: OTP sent successfully }
        '400': { description: Bad request }
        '401': { description: Unauthorized - authentication required }

  /auth/registration/otp/verify:
    post:
      summary: Verify OTP for registration
      description: Verify OTP sent for registration verification (requires authentication)
      tags: [Onboarding]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [otp]
              properties:
                otp: 
                  type: string
                  example: '123456'
                  description: 6-digit OTP received
      responses:
        '200':
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  message: { type: string, example: OTP verified successfully }
        '400': { description: Invalid OTP }
        '401': { description: Unauthorized - authentication required }

  # KYC
  # /kyc/submit:
  #   post:
  #     summary: Submit single KYC document for verification
  #     description: Upload and submit a single KYC document with file attachment
  #     tags: [KYC]
  #     security: [{ bearerAuth: [] }]
  #     requestBody:
  #       required: true
  #       content:
  #         multipart/form-data:
  #           schema:
  #             type: object
  #             required: [documentType, file]
  #             properties:
  #               documentType: 
  #                 type: string
  #                 enum: [AADHAAR_FRONT, AADHAAR_BACK, PAN, SHOP_IMAGE, GST_CERTIFICATE]
  #                 description: Type of document being submitted
  #               file:
  #                 type: string
  #                 format: binary
  #                 description: Document file to upload
  #     responses:
  #       '200': 
  #         description: Document submitted and verified successfully
  #         content:
  #           application/json:
  #             schema:
  #               type: object
  #               properties:
  #                 success: { type: boolean }
  #                 message: { type: string }
  #       '400': { description: Invalid request or document already pending }
  #       '401': { description: Unauthorized }

  /kyc/submit-bulk:
    post:
      summary: Submit multiple KYC documents in bulk
      description: |
        Upload multiple KYC documents at once. Use field names as document types.
        Allowed types: AADHAAR_FRONT, AADHAAR_BACK, PAN, SHOP_IMAGE, GST_CERTIFICATE
        
        **Counter Staff Association:**
        Counter Staff can optionally provide `retailerUserId` to link with a retailer.
        Association Error Codes (in `data.association.errorCode`):
        - 1000: Retailer user not found
        - 1001: Invalid user role (not a retailer)
        - 1002: Counter staff already has an active or inactive association
        - 1003: Association already exists
        - 1004: Parent user not found
        - 1005: Child user not found

        Constraints:
          - Max 5 files
          - User must be in correct block status (Retailer: bank_account_verified/pending_kyc_verification, Others: digilocker/pan_verification/pending_kyc_verification)
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                retailerUserId:
                  type: integer
                  description: Optional ID of the retailer to associate with (Counter Staff only)
                AADHAAR_FRONT:
                  type: string
                  format: binary
                  description: Aadhaar front side image
                AADHAAR_BACK:
                  type: string
                  format: binary
                  description: Aadhaar back side image
                PAN:
                  type: string
                  format: binary
                  description: PAN card image
                SHOP_IMAGE:
                  type: string
                  format: binary
                  description: Shop photograph
                GST_CERTIFICATE:
                  type: string
                  format: binary
                  description: GST certificate
      responses:
        '200':
          description: Documents submitted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      association:
                        type: object
                        description: Result of the retailer association request (Counter Staff only)
                        properties:
                          success: { type: boolean }
                          message: { type: string }
                          errorMessage: { type: string }
                          errorCode: { type: integer, description: "Error codes: 1000-1005 (see endpoint description)" }
                          data: { type: object }
                      total: { type: integer, example: 2 }
                      successful: { type: integer, example: 2 }
                      failed: { type: integer, example: 0 }
                      results:
                        type: array
                        items:
                          type: object
                          properties:
                            file: { type: string, example: "aadhar_front.jpg" }
                            documentType: { type: string, example: "AADHAAR_FRONT" }
                            status: { type: string, enum: [success, failed], example: "success" }
                            document:
                              type: object
                              description: detailed document object if success
                            error: { type: string, example: "Invalid file type" }
                  message: { type: string, example: "2 of 2 documents submitted successfully" }
        '400':
          description: Validation error (no files, too many files, invalid doc type)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden - Invalid user block status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /kyc/status:
    get:
      summary: Get KYC verification status
      description: Get overall KYC status and details of all submitted documents
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      responses:
        '200': 
          description: KYC status with all documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      overallStatus: { type: string }
                      documents:
                        type: array
                        items:
                          type: object
                          properties:
                            documentType: { type: string }
                            verificationStatus: { type: string, enum: [pending, verified, rejected, expired] }
                            fileAccessUrl: { type: string, description: "Signed URL for file access if available" }
                            rejectionReason: { type: string }
                            createdAt: { type: string, format: date-time }
                            updatedAt: { type: string, format: date-time }

  /kyc/documents/{documentType}:
    get:
      summary: Get specific document details
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentType
          required: true
          schema: 
            type: string
            enum: [AADHAAR_FRONT, AADHAAR_BACK, PAN, SHOP_IMAGE, GST_CERTIFICATE]
      responses:
        '200': 
          description: Document details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      documentType: { type: string }
                      status: { type: string }
                      documentUrl: { type: string }
                      uploadedAt: { type: string, format: date-time }
        '404': { description: Document not found }

    put:
      summary: Resubmit document for verification
      description: Reupload a document that was rejected or needs update
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: documentType
          required: true
          schema: 
            type: string
            enum: [AADHAAR_FRONT, AADHAAR_BACK, PAN, SHOP_IMAGE, GST_CERTIFICATE]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200': { description: Document resubmitted }
        '400': { description: Cannot resubmit at this time }

  /kyc/history:
    get:
      summary: Get KYC submission history
      description: Get paginated history of all KYC submissions
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: pageSize
          schema: { type: integer, default: 20 }
      responses:
        '200': 
          description: KYC history with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      submissions:
                        type: array
                        items:
                          type: object
                      total: { type: integer }
                      page: { type: integer }
                      pageSize: { type: integer }

  /kyc/verify-pan:
    post:
      summary: Verify PAN number
      description: Verify PAN card number through third-party service (Tenacio). Requires `digilocker` status.
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [panNumber]
              properties:
                panNumber:
                  type: string
                  pattern: '^[A-Z]{5}[0-9]{4}[A-Z]{1}$'
                  example: 'ABCDE1234F'
                  description: 10-character PAN number
      responses:
        '200':
          description: PAN verified successfully or verification failed gracefully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      verified: { type: boolean, example: true }
                  message: { type: string, example: 'PAN verification successful' }
        '400':
          description: Validation error or invalid PAN format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: User not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403': 
          description: Block status is not 'digilocker'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /kyc/verify-gst:
    post:
      summary: Verify GST number
      description: Verify GST number through third-party service. Only for Retailers. Requires `pan_verification` status.
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [gstNumber]
              properties:
                gstNumber:
                  type: string
                  pattern: '^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$'
                  example: '27AAACR5055K1Z7'
                  description: 15-character GST number
      responses:
        '200':
          description: GST verified successfully or verification failed gracefully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      verified: { type: boolean }
                      gstData: { type: object }
        '400': 
          description: Invalid GST format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Not Retailer or invalid block status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /kyc/verify-bank-account:
    post:
      summary: Verify bank account
      description: Verify bank account details through penny drop. Only for Retailers. Requires `gst_number_verification` status.
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountNumber, ifscCode]
              properties:
                accountNumber:
                  type: string
                  minLength: 9
                  maxLength: 18
                  example: '1234567890'
                  description: Bank account number (9-18 digits)
                ifscCode:
                  type: string
                  pattern: '^[A-Z]{4}0[A-Z0-9]{6}$'
                  example: 'KKBK0008073'
                  description: IFSC code
      responses:
        '200':
          description: Bank account verified or verification failed gracefully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      verified: { type: boolean }
                      bankData: { type: object }
        '400':
          description: Invalid account details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden (Not Retailer or invalid block status)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /kyc/verify-upi:
    post:
      summary: Verify UPI ID
      description: Verify UPI ID validation.
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [upiId]
              properties:
                upiId:
                  type: string
                  pattern: '^[\w.-]+@[\w.-]+$'
                  example: 'username@bank'
                  description: Valid UPI ID
      responses:
        '200':
          description: UPI verified or verification failed gracefully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      verified: { type: boolean }
                      upiData: { type: object }
        '400':
          description: Invalid UPI ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /kyc/registrations/verify-bank-account:
    post:
      summary: Verify registration bank account
      description: Verify bank account during registration. Updates user blockStatus if successful.
      tags: [KYC]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [accountNumber, ifscCode]
              properties:
                accountNumber:
                  type: string
                  minLength: 9
                  maxLength: 18
                  example: '1234567890'
                  description: Bank account number
                ifscCode:
                  type: string
                  pattern: '^[A-Z]{4}0[A-Z0-9]{6}$'
                  example: 'KKBK0008073'
                  description: IFSC code
      responses:
        '200':
          description: Verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data: { type: object }
        '403': { description: Invalid block status }

