  /users/associations:
    post:
      summary: Create association (Counter Staff to Retailer)
      description: Counter staff creates an association request with a retailer. Status starts as 'inactive'.
      tags: [User Associations]
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [retailerUserId]
              properties:
                retailerUserId:
                  type: integer
                  description: User ID of the retailer
                  example: 456
      responses:
        '200':
          description: Association created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      parentUserId: { type: integer, description: Retailer user ID }
                      childUserId: { type: integer, description: Counter staff user ID }
                      associationType: { type: string, example: counter_staff_to_retailer }
                      status: { type: string, enum: [inactive, active, rejected, deactive], example: inactive }
                      metadata: { type: object }
                      createdAt: { type: string, format: date-time }
                      updatedAt: { type: string, format: date-time }
                  message: { type: string, example: Association created successfully with inactive status }
        '400':
          description: Bad request - validation error or already has association
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error:
                    type: object
                    properties:
                      message: { type: string }
                      details: { type: string }
        '403':
          description: Forbidden - Only Counter Staff can create associations

    get:
      summary: List user associations
      description: Get all associations for the authenticated user. Retailers see their counter staff, counter staff see their retailer.
      tags: [User Associations]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: asParent
          schema:
            type: string
            enum: ['true', 'false']
            default: 'true'
          description: "true: view as parent (retailer gets counter staff), false: view as child (counter staff gets retailer)"
        - in: query
          name: associationType
          schema: { type: string, example: counter_staff_to_retailer }
          description: Filter by association type
      responses:
        '200':
          description: List of associations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      associations:
                        type: array
