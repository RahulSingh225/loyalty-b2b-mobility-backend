openapi: 3.0.3
info:
  title: Loyalty API
  version: 1.0.0
  description: QR-based loyalty system with events, redemptions, KYC
servers:
  - url: http://localhost:5000/api/v1
tags:
  - name: Auth
  - name: Onboarding
  - name: KYC
  - name: Users
  - name: Transactions
  - name: Earning
  - name: Redemptions
  - name: Tickets
  - name: Creatives
  - name: User Associations
  - name: Notifications
  - name: Master
  - name: TDS
  - name: Marketplace
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { type: object, properties: { message: { type: string }, correlationId: { type: string } } }
        code: { type: integer }
    ScanRequest:
      type: object
      required: [qrCode, latitude, longitude]
      properties:
        qrCode: { type: string, maxLength: 255 }
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }
        metadata: { type: object }
    ScanResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            grossPoints: { type: number }
            netPoints: { type: number }
            tdsDeducted: { type: number }
            message: { type: string }
        correlationId: { type: string }
    RegisterRequest:
      type: object
      required: [phone, password, userType]
      properties:
        name: { type: string, example: 'John Doe' }
        phone: { type: string, example: '9147948258' }
        email: { type: string, example: 'john@example.com' }
        userType: { type: string, enum: [retailer, electrician, counter_staff], example: 'retailer' }
        onboardingType: { type: string, enum: [self, admin, api], default: 'self' }
        password: { type: string, format: password, example: 'Pass@123' }
        aadhaar: { type: string, example: '123456789012' }
        pan: { type: string, example: 'ABCDE1234F' }
        gst: { type: string, example: '27AAACR5055K1Z7' }
        address: { type: string }
        city: { type: string }
        district: { type: string }
        state: { type: string }
        pincode: { type: string, example: '400001' }
        dob: { type: string, format: date, example: '1990-01-01' }
        referralCode: { type: string, example: '852fdbn5A' }
        shopName: { type: string, example: 'Sturlite Shop' }
        electricianCertificate: { type: string }
        attachedRetailerId: { type: integer }
        sapCustomerCode: { type: string }
    UserSummary:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
    AuthResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
        correlationId: { type: string }
    SimpleType:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: string }
        isActive: { type: boolean }
    RedemptionTypesResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            channels:
              type: array
              items:
                $ref: '#/components/schemas/SimpleType'
            statuses:
              type: array
              items:
                $ref: '#/components/schemas/SimpleType'
        correlationId: { type: string }
    TicketTypesResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            types:
              type: array
              items:
                $ref: '#/components/schemas/SimpleType'
            statuses:
              type: array
              items:
                $ref: '#/components/schemas/SimpleType'
        correlationId: { type: string }
    PincodeResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            id: { type: integer }
            pincode: { type: string }
            city: { type: string }
            district: { type: string }
            state: { type: string }
            zone: { type: string }
        correlationId: { type: string }
    UserProfile:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: string }
        email: { type: string }
        roleId: { type: integer }
        blockStatus: { type: string }
        dob: { type: string }
        gender: { type: string }
        addressLine1: { type: string }
        addressLine2: { type: string }
        pincode: { type: string }
        city: { type: string }
        district: { type: string }
        state: { type: string }
        profilePhotoUrl: { type: string }
    UpdateRegistrationProfileRequest:
      type: object
      required: [addressLine1, addressLine2, pincode]
      properties:
        addressLine1: { type: string, minLength: 1 }
        addressLine2: { type: string, minLength: 1 }
        pincode: { type: string, minLength: 6, maxLength: 6 }
        profile-img: { type: string, format: binary }
    TicketInput:
      type: object
      required: [typeId, description]
      properties:
        typeId: { type: integer }
        subject: { type: string }
        description: { type: string }
        priority: { type: string, enum: [Low, Medium, High], default: Medium }
        imageUrl: { type: string }
        videoUrl: { type: string }
        metadata: { type: object }
    TicketUpdate:
      type: object
      properties:
        statusId: { type: integer }
        priority: { type: string, enum: [Low, Medium, High] }
        resolutionNotes: { type: string }
        assigneeId: { type: integer }
        metadata: { type: object }
    KycApproveRequest:
      type: object
      required: [userId]
      properties:
        userId: { type: integer }
        documents: { type: object }
paths:
  # Auth
  /auth/register:
    post:
      summary: User registration
      tags: [Onboarding]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Phone or Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login/password:
    post:
      summary: Login with password
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, password]
              properties:
                phone: { type: string, example: '9888888888' }
                password: { type: string, format: password, example: 'Pass@123' }
      responses:
        '200': 
          description: Login success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401': 
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/otp/send:
    post:
      summary: Send OTP
      description: Send OTP for login, password reset or registration
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, channel]
              properties:
                phone: { type: string, example: '9888888888' }
                channel: { type: string, enum: [sms, email], example: 'sms' }
                purpose: { type: string, enum: [login, password_reset, registration], default: password_reset, example: 'password_reset' }
      responses:
        '200': 
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: 
                    type: object
                    properties:
                      sent: { type: boolean, example: true }
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/otp/verify:
    post:
      summary: Verify OTP
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp, purpose]
              properties:
                phone: { type: string, example: '9888888888' }
                otp: { type: string, example: '123456' }
                purpose: { type: string, enum: [login, password_reset, registration], default: password_reset, example: 'password_reset' }
      responses:
        '200': 
          description: OTP verified successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: { type: boolean, example: true }
        '400': { description: Validation error }
        '401': { description: Invalid OTP }
#   /auth/reset/request:
#     post:
#       summary: Request password reset (send OTP)
#       tags: [Auth]
#       requestBody:
#         required: true
#         content:
#           application/json:
#             schema:
#               type: object
#               properties:
#                 phone: { type: string }
#                 channel: { type: string, enum: [sms, email] }
#       responses:
#         '200': { description: OTP sent }
  /auth/reset/confirm:
    post:
      summary: Confirm password reset (verify OTP)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone, otp, newPassword]
              properties:
                phone: { type: string, example: '9888888888' }
                otp: { type: string, example: '123456' }
                newPassword: { type: string, format: password, example: 'NewPass@123' }
      responses:
        '200': 
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data: 
                     type: object
                     properties:
                       reset: { type: boolean, example: true }
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

#   /auth/refresh:
