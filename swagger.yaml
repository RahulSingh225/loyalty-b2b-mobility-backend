                            parentUserId: { type: integer }
                            childUserId: { type: integer }
                            parentUser:
                              type: object
                              properties:
                                id: { type: integer }
                                name: { type: string }
                                phone: { type: string }
                                email: { type: string }
                                roleId: { type: integer }
                                profilePhotoUrl: { type: string }
                            childUser:
