  /users/associations/{id}/status:
    put:
      summary: Update association status
      description: |
        Update the status of an association with strict transition rules:
        - inactive → active (Retailer only)
        - inactive → rejected (Retailer only)
        - active → deactive (Both parties)
        - rejected/deactive are final states (cannot change)
      tags: [User Associations]
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [active, inactive, rejected, deactive]
                  description: |
                    - active: Approved and working
                    - inactive: Pending approval
                    - rejected: Retailer declined (final)
                    - deactive: Relationship ended (final)
      responses:
        '200':
          description: Status updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  data:
                    type: object
                    properties:
                      id: { type: integer }
                      status: { type: string }
                      updatedAt: { type: string, format: date-time }
                  message: { type: string }
        '400':
          description: Invalid status transition
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  error:
                    type: object
                    properties:
                      message: { type: string, example: Invalid status transition }
                      details: { type: string }
        '403':
          description: Unauthorized - only retailer can activate, only involved parties can modify
        '404': { description: Association not found }



